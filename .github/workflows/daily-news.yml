name: Daily News

# Generates and publishes fresh articles once a day (and on manual trigger).
on:
  schedule:
    - cron: "0 1 * * *" # 01:00 UTC (~06:30 IST) — before the day's social posts
  workflow_dispatch:
    inputs:
      limit:
        description: "Max articles to generate this run"
        required: false
        default: "30"

concurrency:
  group: daily-news
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx prisma generate
      - name: Generate daily news
        run: npx tsx scripts/generate-news.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          GEMINI_IMAGE_MODEL: ${{ secrets.GEMINI_IMAGE_MODEL }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          GENERATE_LIMIT: ${{ github.event.inputs.limit || '30' }}
