name: Instagram Posts

# Growth-tuned, REEL-HEAVY cadence: 5 posts/day across Indian peak hours
# (IST = UTC+5:30). Reels drive the most new-follower reach, so 3 are spread
# across the day. Each run posts ONE item; the type is chosen from the cron
# expression below:
#   02:30 UTC (~08:00 IST)  -> themed feed post
#   05:00 UTC (~10:30 IST)  -> history "From the Archives" Reel
#   08:30 UTC (~14:00 IST)  -> Indian-politics Reel
#   13:00 UTC (~18:30 IST)  -> trending recent-news Reel
#   15:30 UTC (~21:00 IST)  -> Story teaser
on:
  schedule:
    - cron: "30 2 * * *"
    - cron: "0 5 * * *"
    - cron: "30 8 * * *"
    - cron: "0 13 * * *"
    - cron: "30 15 * * *"
  workflow_dispatch:
    inputs:
      action:
        description: "Force a post type (theme|reel|reelpolitics|reelnews|article|story|reels3). Leave blank to auto-pick by time."
        required: false
        default: ""

concurrency:
  group: instagram-posts
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx prisma generate
      # Reels are assembled with ffmpeg (multi-image + voiceover). Ensure it's present.
      - name: Ensure ffmpeg
        run: ffmpeg -version >/dev/null 2>&1 || sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg
      # Pick the post type from the *cron expression that triggered this run*,
      # not the actual clock time — GitHub schedules routinely run 30–90 min
      # late, which used to make the delayed 06:00 "reel" slot post an article.
      - name: Pick post type
        id: pick
        run: |
          case "${{ github.event.schedule }}" in
            "30 2 * * *")  action=theme ;;
            "0 5 * * *")   action=reel ;;
            "30 8 * * *")  action=reelpolitics ;;
            "0 13 * * *")  action=reelnews ;;
            "30 15 * * *") action=story ;;
            *)             action=article ;;
          esac
          if [ -n "${{ github.event.inputs.action }}" ]; then action="${{ github.event.inputs.action }}"; fi
          echo "action=$action" >> "$GITHUB_OUTPUT"
          echo "Selected SOCIAL_ACTION=$action (schedule='${{ github.event.schedule }}')"
      - name: Post one Instagram item
        run: npx tsx scripts/social-slot.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          GEMINI_IMAGE_MODEL: ${{ secrets.GEMINI_IMAGE_MODEL }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          IG_BRAND_HANDLE: ${{ secrets.IG_BRAND_HANDLE }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_GRAPH_BASE: ${{ secrets.IG_GRAPH_BASE }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          SOCIAL_ACTION: ${{ steps.pick.outputs.action }}
