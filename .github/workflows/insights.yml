name: Instagram Insights

# Refreshes likes/reach/saves/shares for recent posts and logs which formats
# perform best, so we can lean into winners.
on:
  schedule:
    - cron: "0 20 * * *" # 20:00 UTC daily (after the day's posts have had time to gather engagement)
  workflow_dispatch:

concurrency:
  group: instagram-insights
  cancel-in-progress: false

jobs:
  insights:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx prisma generate
      - name: Refresh Instagram insights
        run: npx tsx scripts/social-insights.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_GRAPH_BASE: ${{ secrets.IG_GRAPH_BASE }}
